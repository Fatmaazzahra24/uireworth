<section id="register" class="screen">
      <div class="screen__meta"><strong>/register</strong><span>Auth screen</span></div>
      <article class="phone phone--auth">
        <div class="auth-beam"></div>
        <div class="phone__body">
          <div class="status-bar">
            <span>19:08</span>
            <span class="status-icons"><span>&#9679;</span><span>&#9679;</span><span class="status-pill"></span></span>
          </div>
          <div class="glass-card">
            <h2 class="glass-card__title">Daftar ke ReWorth</h2>
            <p class="glass-card__subtitle">Buat akun baru Anda</p>
            <div class="stack-form">
              <div class="field"><div class="field__icon">☺</div><div class="field__text">Nama lengkap</div></div>
              <div class="field"><div class="field__icon">☎</div><div class="field__text">08xxxxxxxxxx atau +62xxxxxxxxxx</div></div>
              <div class="field"><div class="field__icon">✉</div><div class="field__text">E-mail</div></div>
              <div class="field">
                <div class="field__icon">🔒</div>
                <div class="field__text">Kata sandi</div>
                <div class="field__suffix">◔</div>
              </div>
              <div class="field">
                <div class="field__icon">✔</div>
                <div class="field__text">Konfirmasi kata sandi</div>
                <div class="field__suffix">◔</div>
              </div>
              <div class="checkbox-row">
                <span class="checkbox checkbox--checked"></span>
                <span class="body-copy" style="margin:0;font-size:12.8px;line-height:1.45;">Saya menyetujui kebijakan dan ketentuan.</span>
              </div>
              <div class="button button--neon">Buat Akun</div>
              <div class="auth-link">Sudah punya akun? <strong>Masuk</strong></div>
            </div>
          </div>
        </div>
      </article>
    </section>
