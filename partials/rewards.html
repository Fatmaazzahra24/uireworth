<section id="rewards" class="screen">
      <div class="screen__meta"><strong>/rewards</strong><span>Rewards screen</span></div>
      <article class="phone phone--dark">
        <div class="phone__body">
          <div class="status-bar">
            <span>19:12</span>
            <span class="status-icons"><span>&#9679;</span><span>&#9679;</span><span class="status-pill"></span></span>
          </div>
          <div class="top-row">
            <div class="back-button">←</div>

          </div>

            <div class="reward-item" style="background:linear-gradient(145deg,#f0eadb,#d9d3b0); color:#20372e;">
              <div class="summary-row">
                <div style="display:flex;gap:12px;align-items:center;">
                  <div class="icon-chip" style="background:#fff;color:#1f5e23;">🎁</div>
                  <div>
                    <p class="item-title" style="color:#193226;">Botol Tumbler</p>
                    <p class="item-subtitle" style="color:rgba(25,50,38,.70);">Limited reward</p>
                  </div>
                </div>
                <span class="badge badge--success" style="background:#1f5e23;color:#fff;">250 poin</span>
              </div>
            </div>
          </div>
        </div>
