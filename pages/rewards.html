<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ReWorth / Tukar Poin Reward</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <script defer src="../assets/js/app.js"></script>
</head>
<body data-page="rewards" data-partial="../partials/rewards.html" data-title="ReWorth / Tukar Poin Reward">
  <main id="page-root" class="page-root">
<section id="rewards" class="screen">
      <div class="screen__meta"><strong>/rewards</strong><span>Rewards screen</span></div>
      <article class="phone phone--dark">
        <div class="phone__body">
          <div class="status-bar">
            <span>19:12</span>
            <span class="status-icons"><span>&#9679;</span><span>&#9679;</span><span class="status-pill"></span></span>
          </div>
          <div class="top-row">
            <div class="back-button">←</div>
            <h2 class="screen-title">Tukar Poin Reward</h2>
          </div>
          <div class="point-card">
            <p class="point-card__label">Poin Anda</p>
            <div class="point-card__value">0</div>
            <p class="point-card__sub">Poin tersedia untuk ditukar</p>
          </div>
          <div class="search-bar" style="margin-top:14px;"><span class="search-bar__icon">⌕</span><span class="search-bar__text">Cari reward...</span></div>
          <div class="reward-list" style="margin-top:14px;">
            <div class="reward-item" style="background:linear-gradient(145deg,#e5f0db,#bfd6ac); color:#20372e;">
              <div class="summary-row">
                <div style="display:flex;gap:12px;align-items:center;">
                  <div class="icon-chip" style="background:#fff;color:#1f5e23;">🎁</div>
                  <div>
                    <p class="item-title" style="color:#193226;">Voucher Belanja</p>
                    <p class="item-subtitle" style="color:rgba(25,50,38,.70);">Hadiah populer</p>
                  </div>
                </div>
                <span class="badge badge--success" style="background:#1f5e23;color:#fff;">100 poin</span>
              </div>
            </div>
            <div class="reward-item" style="background:linear-gradient(145deg,#f0eadb,#d9d3b0); color:#20372e;">
              <div class="summary-row">
                <div style="display:flex;gap:12px;align-items:center;">
                  <div class="icon-chip" style="background:#fff;color:#1f5e23;">🎁</div>
                  <div>
                    <p class="item-title" style="color:#193226;">Botol Tumbler</p>
                    <p class="item-subtitle" style="color:rgba(25,50,38,.70);">Limited reward</p>
                  </div>
                </div>
                <span class="badge badge--success" style="background:#1f5e23;color:#fff;">250 poin</span>
              </div>
            </div>
          </div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
