<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ReWorth / Keranjang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <script defer src="../assets/js/app.js"></script>
</head>
<body data-page="cart" data-partial="../partials/cart.html" data-title="ReWorth / Keranjang">
  <main id="page-root" class="page-root">
<section id="cart" class="screen">
      <div class="screen__meta"><strong>/cart</strong><span>Cart screen</span></div>
      <article class="phone phone--dark">
        <div class="phone__body">
          <div class="status-bar">
            <span>19:04</span>
            <span class="status-icons"><span>&#9679;</span><span>&#9679;</span><span class="status-pill"></span></span>
          </div>
          <div class="top-row">
            <div class="back-button">←</div>
            <h2 class="screen-title">Keranjang</h2>
          </div>
          <div class="cart-list">
            <div class="cart-item">
              <div class="cart-item__row">
                <div class="checkbox checkbox--checked"></div>
                <div class="thumb thumb--enzyme"></div>
                <div>
                  <p class="item-title">Eco Enzyme 1...</p>
                  <p class="item-price">Rp 25.000</p>
                  <p class="price-sub">Subtotal: Rp 25.000</p>
                </div>
                <div class="stepper">
                  <div class="stepper__button stepper__button--white">−</div>
                  <div class="stepper__value">1</div>
                  <div class="stepper__button stepper__button--mint">+</div>
                </div>
              </div>
            </div>
            <div class="cart-item">
              <div class="cart-item__row">
                <div class="checkbox checkbox--checked"></div>
                <div class="thumb thumb--shell"></div>
                <div>
                  <p class="item-title">Kaca kerang</p>
                  <p class="item-price">Rp 20.000</p>
                  <p class="price-sub">Subtotal: Rp 20.000</p>
                </div>
                <div class="stepper">
                  <div class="stepper__button stepper__button--white">−</div>
                  <div class="stepper__value">1</div>
                  <div class="stepper__button stepper__button--mint">+</div>
                </div>
              </div>
            </div>
          </div>
          <div class="cart-footer">
            <div class="cart-footer__row">
              <div>
                <p class="cart-footer__small">Total</p>
                <p class="cart-footer__total">Rp 45.000</p>
                <p class="cart-footer__meta">2 produk dipilih - 2 item</p>
              </div>
              <div class="button button--light">Checkout</div>
            </div>
          </div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
