<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ReWorth / Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <script defer src="../assets/js/app.js"></script>
</head>
<body data-page="login" data-partial="../partials/login.html" data-title="ReWorth / Login">
  <main id="page-root" class="page-root">
<section id="login" class="screen">
      <div class="screen__meta"><strong>/login</strong><span>Auth screen</span></div>
      <article class="phone phone--auth">
        <div class="auth-beam"></div>
        <div class="phone__body">
          <div class="status-bar">
            <span>19:07</span>
            <span class="status-icons"><span>&#9679;</span><span>&#9679;</span><span class="status-pill"></span></span>
          </div>
          <div class="glass-card">
            <h2 class="glass-card__title">Masuk ke ReWorth</h2>
            <p class="glass-card__subtitle">Login akun Anda</p>
            <div class="stack-form">
              <div class="field">
                <div class="field__icon">✉</div>
                <div class="field__text">demo@reworth.app</div>
              </div>
              <div class="field">
                <div class="field__icon">🔒</div>
                <div class="field__text">••••••••••</div>
                <div class="field__suffix">◔</div>
              </div>
              <div class="row-space">
                <div class="checkbox-row">
                  <span class="checkbox"></span>
                  <span class="muted">Ingat saya</span>
                </div>
                <div class="small-link">Lupa kata sandi?</div>
              </div>
              <div class="button button--neon">Masuk</div>
              <div class="auth-link">Belum punya akun? <strong>Daftar</strong></div>
            </div>
          </div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
