<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">

<body data-page="bank-account-detail" data-partial="../partials/bank-account-detail.html" data-title="ReWorth / Detail Akun Bank">
  <main id="page-root" class="page-root">
<section id="bank-account-detail" class="screen">
      <div class="screen__meta"><strong>/bank-account-detail</strong><span>Bank detail</span></div>
      <article class="phone phone--dark">
        <div class="phone__body">
          <div class="status-bar">
            <span>19:11</span>
            <span class="status-icons"><span>&#9679;</span><span>&#9679;</span><span class="status-pill"></span></span>
          </div>
          <div class="top-row">
            <div class="back-button">←</div>
            <h2 class="screen-title">Detail Akun Bank</h2>
          </div>
          <div class="bank-item">
            <div class="bank-item__header">
              <div style="display:flex;gap:12px;align-items:center;">
                <div class="bank-item__logo">▣</div>
                <div>
                  <p class="bank-item__name">bank jatim</p>
                  <p class="bank-item__number">•••• •••• 0046</p>

              </div>

            </div>
            <div class="detail-divider"></div>
            <div class="form-grid">
              <div><label class="form-field-label">Jenis Kartu</label><div class="form-field">ATM / Debit</div></div>
              <div><label class="form-field-label">Nama Pemilik</label><div class="form-field">Fatma</div></div>
              <div><label class="form-field-label">Nomor Rekening</label><div class="form-field">**** **** 0046</div></div>
            </div>
          </div>
          <div class="button button--ghost" style="margin-top:14px;">Simpan Perubahan</div>
        </div>
      </article>
    </section>
  </main>
